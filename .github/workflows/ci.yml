name: CI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/Philiprehberger.ColorConverter.csproj

      - name: Build
        run: dotnet build src/Philiprehberger.ColorConverter.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Philiprehberger.ColorConverter.csproj --configuration Release --no-build -o out

      - name: Publish to NuGet
        run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
